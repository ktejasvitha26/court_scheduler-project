<!DOCTYPE html>

<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h2>Court Hearing Dashboard</h2>

<!-- TOP BAR -->

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">

```
<div>
    <a href="/add_case">Add Case</a>
    <a href="/schedule">Schedule Hearing</a>
</div>

<div>
    <a href="/logout">Logout</a>
</div>
```

</div>

<!-- ✅ SUCCESS MESSAGE (FINAL FIXED) -->

{% if msg %}

<div style="background:#d4edda; padding:10px; color:#155724; border-radius:5px; margin-bottom:15px;">
    {{ msg }}
</div>
{% endif %}

<!-- TABLE -->

<table border="1" cellpadding="10" cellspacing="0" width="100%">

<tr>
<th>ID</th>
<th>Case</th>
<th>Judge</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
<th>Next Date</th>
<th>Next Time</th>
<th>Action</th>
</tr>

{% for h in hearings %}

<tr>

<td>{{ h[0] }}</td>
<td>{{ h[1] }}</td>
<td>{{ h[2] }}</td>
<td>{{ h[3] }}</td>
<td>{{ h[4] }}</td>
<td>{{ h[5] }}</td>
<td>{{ h[6] }}</td>
<td>{{ h[7] }}</td>

<td>
    <a href="/delete/{{ h[0] }}"
       style="color:red; font-weight:bold;"
       onclick="return confirm('Are you sure you want to delete this record?')">
       Delete
    </a>
</td>

</tr>
{% endfor %}

</table>

</div>

</body>
</html>
